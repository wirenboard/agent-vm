name: release-npm

# Build the agent-vm binary + patched msb + bundle libkrunfw for each
# supported platform, then publish the main package and per-platform
# subpackages to npm. Tagged releases only — `v<semver>` (e.g. v1.2.3).
#
# The image is published on a separate cadence (see build-image.yml);
# binary releases pin the default image to the moving `:latest` tag.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (without leading v). Required when running manually.'
        required: true

permissions:
  contents: read
  id-token: write   # for npm provenance

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - id: v
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == 'workflow_dispatch' ]]; then
            v="${{ inputs.version }}"
          else
            # tag form: v1.2.3 -> 1.2.3
            v="${GITHUB_REF_NAME#v}"
          fi
          if ! [[ "$v" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
            echo "::error::version $v is not a valid semver"; exit 1
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"

  # Two parallel build jobs, one per binary. Each has its own
  # Swatinem/rust-cache@v2 keyed on the relevant Cargo.lock — no
  # cross-pollination between the workspaces, so an msb-only bump
  # doesn't blow away the agent-vm cache and vice-versa.
  #
  # Both run in the same OS prereq install + Rust toolchain step;
  # only the build command and cache key differ. The msb job also
  # overrides the release profile via env to relax LTO (the
  # vendor/microsandbox profile is `lto=fat, codegen-units=1` which
  # adds ~3 min of single-threaded link time per CI run — runtime
  # perf is negligible for a TLS proxy, not worth the wait).

  build-agent-vm:
    needs: resolve-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            runner: ubuntu-latest
            cargo_target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5
        # No submodules — the agent-vm crate doesn't need
        # vendor/microsandbox source to compile (it depends on
        # microsandbox via a path dep, but we have it at the
        # workspace level... wait, actually it does need it via
        # path = "../../vendor/microsandbox/crates/microsandbox").
        # Keep recursive checkout.
        with:
          submodules: 'recursive'

      - name: Install Rust toolchain + linux deps
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup target add ${{ matrix.cargo_target }}
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libcap-ng-dev libdbus-1-dev libsqlite3-dev pkg-config

      - name: Cargo cache (rust-cache)
        uses: Swatinem/rust-cache@v2
        with:
          # Workspace root → cache target/. Action auto-keys on
          # rustc version + OS + Cargo.lock hash + a default salt.
          workspaces: ". -> target"
          # Unique suffix so this job doesn't fight build-msb for
          # the same key (different effective Cargo.lock content).
          key: agent-vm-${{ matrix.platform }}

      - name: cargo build --release -p agent-vm
        run: cargo build --release --target ${{ matrix.cargo_target }} -p agent-vm

      - name: Upload agent-vm binary
        uses: actions/upload-artifact@v7
        with:
          name: agent-vm-bin-${{ matrix.platform }}
          path: target/${{ matrix.cargo_target }}/release/agent-vm
          retention-days: 7
          if-no-files-found: error

  build-msb:
    needs: resolve-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            runner: ubuntu-latest
            cargo_target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.runner }}
    env:
      # Override vendor/microsandbox's `lto=true, codegen-units=1`
      # release profile for CI. Keeps `panic=abort` (changes
      # behaviour) and `strip=true` (no symbols needed) intact.
      # Cuts msb link time from ~4 min to ~30s with negligible
      # runtime cost on a TLS-proxy workload.
      CARGO_PROFILE_RELEASE_LTO: "thin"
      CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "16"
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: 'recursive'

      - name: Install Rust toolchain + linux deps
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup target add ${{ matrix.cargo_target }}
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libcap-ng-dev libdbus-1-dev libsqlite3-dev pkg-config

      - name: Cargo cache (rust-cache)
        uses: Swatinem/rust-cache@v2
        with:
          # Cache vendor/microsandbox's target/. Action picks up the
          # right Cargo.lock automatically from the workspaces map.
          workspaces: "vendor/microsandbox -> target"
          # Mirrors the env-set LTO/codegen-units into the cache key
          # so a relax-LTO flip doesn't accidentally reuse a fat-LTO
          # build's stale artefacts.
          env-vars: "CARGO_PROFILE_RELEASE_LTO CARGO_PROFILE_RELEASE_CODEGEN_UNITS"
          key: msb-${{ matrix.platform }}

      - name: cargo build --release -p microsandbox-cli --bin msb
        run: |
          cargo build --release --target ${{ matrix.cargo_target }} \
            --manifest-path vendor/microsandbox/Cargo.toml \
            -p microsandbox-cli --bin msb

      - name: Upload msb binary
        uses: actions/upload-artifact@v7
        with:
          name: msb-bin-${{ matrix.platform }}
          path: vendor/microsandbox/target/${{ matrix.cargo_target }}/release/msb
          retention-days: 7
          if-no-files-found: error

  # Assemble per-platform npm subpackage: pull in the two binaries
  # from the parallel build jobs, fetch libkrunfw inline (the curl
  # is ~10s so not worth a separate job), upload the populated
  # subpackage tree as the per-platform artifact the publish job
  # downloads.
  package:
    needs: [resolve-version, build-agent-vm, build-msb]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            runner: ubuntu-latest
            libkrunfw_arch: x86_64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5
        # We need vendor/microsandbox source to read LIBKRUNFW_VERSION
        # and LIBKRUNFW_ABI constants. Recursive fetch needed for the
        # libkrunfw sub-submodule? Actually no — we only need the
        # microsandbox crate source for awk. `submodules: true` (one
        # level) is enough; saves the libkrunfw clone time.
        with:
          submodules: true

      - name: Download agent-vm binary
        uses: actions/download-artifact@v8
        with:
          name: agent-vm-bin-${{ matrix.platform }}
          path: npm-dist/agent-vm-${{ matrix.platform }}/bin/

      - name: Download msb binary
        uses: actions/download-artifact@v8
        with:
          name: msb-bin-${{ matrix.platform }}
          path: npm-dist/agent-vm-${{ matrix.platform }}/bin/

      - name: Resolve libkrunfw versions from vendor/microsandbox
        id: lkv
        shell: bash
        run: |
          set -euo pipefail
          msb_version=$(awk -F\" '/^version *=/{print $2; exit}' \
            vendor/microsandbox/Cargo.toml)
          libkrunfw_version=$(awk -F\" \
            '/^pub const LIBKRUNFW_VERSION *: *&str *= *"/{print $2; exit}' \
            vendor/microsandbox/crates/utils/lib/lib.rs)
          libkrunfw_abi=$(awk -F\" \
            '/^pub const LIBKRUNFW_ABI *: *&str *= *"/{print $2; exit}' \
            vendor/microsandbox/crates/utils/lib/lib.rs)
          test -n "$msb_version" || { echo "::error::could not extract msb version"; exit 1; }
          test -n "$libkrunfw_version" || { echo "::error::could not extract libkrunfw version"; exit 1; }
          test -n "$libkrunfw_abi" || { echo "::error::could not extract libkrunfw abi"; exit 1; }
          echo "msb_version=$msb_version"             >> "$GITHUB_OUTPUT"
          echo "libkrunfw_version=$libkrunfw_version" >> "$GITHUB_OUTPUT"
          echo "libkrunfw_abi=$libkrunfw_abi"         >> "$GITHUB_OUTPUT"

      - name: Fetch libkrunfw from upstream microsandbox release
        shell: bash
        env:
          MSB_V:    ${{ steps.lkv.outputs.msb_version }}
          LK_V:     ${{ steps.lkv.outputs.libkrunfw_version }}
          LK_ABI:   ${{ steps.lkv.outputs.libkrunfw_abi }}
          LK_ARCH:  ${{ matrix.libkrunfw_arch }}
        run: |
          set -euo pipefail
          if [[ "${{ matrix.platform }}" == darwin-* ]]; then
            os_tag=darwin
          else
            os_tag=linux
          fi
          url="https://github.com/superradcompany/microsandbox/releases/download/v${MSB_V}/microsandbox-${os_tag}-${LK_ARCH}.tar.gz"
          echo "Downloading $url"
          dst=npm-dist/agent-vm-${{ matrix.platform }}/lib
          mkdir -p "$dst"
          tmp=$(mktemp -d)
          curl -fsSL -o "$tmp/bundle.tar.gz" "$url"
          tar -xzf "$tmp/bundle.tar.gz" -C "$tmp"
          shopt -s globstar nullglob
          found=0
          for f in "$tmp"/**/libkrunfw*; do
            cp -a "$f" "$dst/"
            found=$((found+1))
          done
          if [[ $found -eq 0 ]]; then
            echo "::error::no libkrunfw* in $url"; ls -R "$tmp"; exit 1
          fi
          rm -rf "$tmp"
          if [[ "$os_tag" == darwin ]]; then
            full="libkrunfw.${LK_ABI}.dylib"
            if [[ ! -e "$dst/$full" ]]; then
              ln -s "libkrunfw.${LK_V}.dylib" "$dst/$full"
            fi
          else
            full="libkrunfw.so.${LK_V}"
            soname="libkrunfw.so.${LK_ABI}"
            test -f "$dst/$full" || { echo "::error::$dst/$full missing after extraction"; exit 1; }
            ln -sf "$full"   "$dst/$soname"
            ln -sf "$soname" "$dst/libkrunfw.so"
          fi
          ls -la "$dst"

      - name: Restore executable bits on the bundled binaries
        # upload-artifact strips POSIX perms when zipping; restore
        # before re-uploading so the next download-artifact lands
        # already-executable. (We *also* chmod in publish as a belt-
        # and-suspenders measure since the round-trip CAN strip
        # perms again — confirmed by v0.1.0's EACCES.)
        run: chmod +x npm-dist/agent-vm-${{ matrix.platform }}/bin/agent-vm \
                       npm-dist/agent-vm-${{ matrix.platform }}/bin/msb

      - name: Upload assembled platform subpackage
        uses: actions/upload-artifact@v7
        with:
          name: agent-vm-${{ matrix.platform }}
          path: npm-dist/agent-vm-${{ matrix.platform }}/
          retention-days: 7
          if-no-files-found: error

  publish:
    needs: [resolve-version, package]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      # Download each platform artifact into its own subpackage
      # directory explicitly. `actions/download-artifact@v8` with
      # `pattern:` + a single matched artifact does NOT wrap it in a
      # subdir (the v5 behaviour change vs v4) — files land flat at
      # the `path:` root. Downloading by exact `name:` into a
      # per-artifact `path:` sidesteps that, and keeps the layout
      # explicit when we add more platforms (just add another
      # download step).
      #
      # Each subpackage's package.json is already on disk from the
      # checkout; the artifact carries bin/ + lib/ on top of it.
      # download-artifact will create missing parents.
      - name: Download linux-x64 artifact
        uses: actions/download-artifact@v8
        with:
          name: agent-vm-linux-x64
          path: npm-dist/agent-vm-linux-x64/

      - name: Verify artifact layout + restore executable bits
        # `actions/upload-artifact@v7` packs files into a zip that
        # doesn't preserve POSIX permissions. After download, the
        # binaries land as 0644 — npm publishes them as-is and users
        # get EACCES on first invocation. Restoring +x here is the
        # smallest fix; declaring them in `bin` of the subpackage's
        # package.json would also work but creates a competing
        # `agent-vm` shim that fights the main package's launcher.
        run: |
          set -e
          for d in npm-dist/agent-vm-*-*/bin; do
            test -f "$d/agent-vm" || { echo "missing $d/agent-vm"; exit 1; }
            test -f "$d/msb" || { echo "missing $d/msb"; exit 1; }
            chmod +x "$d/agent-vm" "$d/msb"
          done

      - name: Set versions in every package.json
        env:
          V: ${{ needs.resolve-version.outputs.version }}
        run: |
          set -e
          for p in npm-dist/*/package.json; do
            # Top-level version
            node -e "
              const fs=require('fs');
              const p='$p';
              const j=JSON.parse(fs.readFileSync(p,'utf8'));
              j.version='${V}';
              if (j.optionalDependencies) {
                for (const k of Object.keys(j.optionalDependencies)) {
                  j.optionalDependencies[k]='${V}';
                }
              }
              fs.writeFileSync(p, JSON.stringify(j,null,2)+'\\n');
            "
          done

      - name: Publish platform subpackages first
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          V: ${{ needs.resolve-version.outputs.version }}
        run: |
          set -e
          # Subpackages MUST be published before the main package, or
          # the main package's optionalDependencies resolve to missing.
          # Each publish is idempotent: if a re-run of a failed release
          # finds a subpackage already at this version (npm 403:
          # "cannot publish over existing version"), we accept that and
          # carry on so the workflow can still publish the main package
          # — avoiding a split-state where subpackages exist at v but
          # the main package never makes it.
          for d in npm-dist/agent-vm-*-*; do
            # Node's `require` only resolves bare-relative paths
            # with a leading `./` — without it the loader treats the
            # argument as a node_modules / built-in spec and bails.
            name=$(node -p "require('./$d/package.json').name")
            existing=$(npm view "$name@$V" version 2>/dev/null || true)
            if [[ "$existing" == "$V" ]]; then
              echo "::notice::$name@$V already published; skipping"
              continue
            fi
            (cd "$d" && npm publish --provenance --access public)
          done

      - name: Publish main package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          V: ${{ needs.resolve-version.outputs.version }}
        run: |
          set -e
          existing=$(npm view "@wirenboard/agent-vm@$V" version 2>/dev/null || true)
          if [[ "$existing" == "$V" ]]; then
            echo "::notice::@wirenboard/agent-vm@$V already published; skipping"
            exit 0
          fi
          cd npm-dist/agent-vm
          npm publish --provenance --access public
