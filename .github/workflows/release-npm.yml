name: release-npm

# Build the agent-vm binary + patched msb + bundle libkrunfw for each
# supported platform, then publish the main package and per-platform
# subpackages to npm. Tagged releases only — `v<semver>` (e.g. v1.2.3).
#
# The image is published on a separate cadence (see build-image.yml);
# binary releases pin the default image to the moving `:latest` tag.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (without leading v). Required when running manually.'
        required: true

permissions:
  contents: read
  id-token: write   # for npm provenance

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - id: v
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == 'workflow_dispatch' ]]; then
            v="${{ inputs.version }}"
          else
            # tag form: v1.2.3 -> 1.2.3
            v="${GITHUB_REF_NAME#v}"
          fi
          if ! [[ "$v" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
            echo "::error::version $v is not a valid semver"; exit 1
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"

  # Two parallel build jobs, one per binary. Each has its own
  # Swatinem/rust-cache@v2 keyed on the relevant Cargo.lock — no
  # cross-pollination between the workspaces, so an msb-only bump
  # doesn't blow away the agent-vm cache and vice-versa.
  #
  # Both run in the same OS prereq install + Rust toolchain step;
  # only the build command and cache key differ. The msb job also
  # overrides the release profile via env to relax LTO (the
  # vendor/microsandbox profile is `lto=fat, codegen-units=1` which
  # adds ~3 min of single-threaded link time per CI run — runtime
  # perf is negligible for a TLS proxy, not worth the wait).

  build-agent-vm:
    needs: resolve-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            runner: ubuntu-latest
            cargo_target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5
        # No submodules — the agent-vm crate doesn't need
        # vendor/microsandbox source to compile (it depends on
        # microsandbox via a path dep, but we have it at the
        # workspace level... wait, actually it does need it via
        # path = "../../vendor/microsandbox/crates/microsandbox").
        # Keep recursive checkout.
        with:
          submodules: 'recursive'

      - name: Install Rust toolchain + linux deps
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup target add ${{ matrix.cargo_target }}
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libcap-ng-dev libdbus-1-dev libsqlite3-dev pkg-config

      - name: Cargo cache (rust-cache)
        uses: Swatinem/rust-cache@v2
        with:
          # Workspace root → cache target/. Action auto-keys on
          # rustc version + OS + Cargo.lock hash + a default salt.
          workspaces: ". -> target"
          # Unique suffix so this job doesn't fight build-msb for
          # the same key (different effective Cargo.lock content).
          key: agent-vm-${{ matrix.platform }}
          # rust-cache@v2 defaults to "save only on the default
          # branch (main)". This workflow fires on `v*.*.*` tags and
          # workflow_dispatch from `rewrite-microsandbox`; neither
          # matches main, so the cache was never being saved and
          # every release re-paid a cold build (~5 min). Force-save
          # so subsequent runs (re-dispatch, redo-after-publish-fail
          # etc.) restore from the previous build's target/.
          save-if: ${{ true }}
          # Cache the *full* target/ including path-dep crates.
          # Default cache-workspace-crates=false strips
          # vendor/microsandbox/crates/* artefacts before save, so
          # a warm-cache run still recompiled ~9 microsandbox-*
          # workspace crates (28s) + the agent-vm crate itself
          # (~70s of LTO link). Caching the full target/ trades
          # ~600 MB extra GH cache space for skipping that work.
          cache-all-crates: "true"
          cache-workspace-crates: "true"

      - name: cargo build --release -p agent-vm
        run: cargo build --release --target ${{ matrix.cargo_target }} -p agent-vm

      - name: Upload agent-vm binary
        uses: actions/upload-artifact@v7
        with:
          name: agent-vm-bin-${{ matrix.platform }}
          path: target/${{ matrix.cargo_target }}/release/agent-vm
          retention-days: 7
          if-no-files-found: error

  build-msb:
    needs: resolve-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            runner: ubuntu-latest
            cargo_target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.runner }}
    env:
      # Override vendor/microsandbox's `lto=true, codegen-units=1`
      # release profile for CI. Keeps `panic=abort` (changes
      # behaviour) and `strip=true` (no symbols needed) intact.
      # Cuts msb link time from ~4 min to ~30s with negligible
      # runtime cost on a TLS-proxy workload.
      CARGO_PROFILE_RELEASE_LTO: "thin"
      CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "16"
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: 'recursive'

      - name: Install Rust toolchain + linux deps
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup target add ${{ matrix.cargo_target }}
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libcap-ng-dev libdbus-1-dev libsqlite3-dev pkg-config

      - name: Cargo cache (rust-cache)
        uses: Swatinem/rust-cache@v2
        with:
          # Cache vendor/microsandbox's target/. Action picks up the
          # right Cargo.lock automatically from the workspaces map.
          workspaces: "vendor/microsandbox -> target"
          # Mirrors the env-set LTO/codegen-units into the cache key
          # so a relax-LTO flip doesn't accidentally reuse a fat-LTO
          # build's stale artefacts.
          env-vars: "CARGO_PROFILE_RELEASE_LTO CARGO_PROFILE_RELEASE_CODEGEN_UNITS"
          key: msb-${{ matrix.platform }}
          # See build-agent-vm; release runs are off main so default
          # save-if would skip every release. Force-save.
          save-if: ${{ true }}
          # Keep path-dep artefacts (microsandbox workspace internals)
          # cached too — default strips them and forces re-link.
          cache-all-crates: "true"
          cache-workspace-crates: "true"

      - name: Build agentd from source (musl) so msb embeds the matching guest agent
        run: |
          # agentd (the guest PID-1 agent) is embedded into msb and injected
          # at boot. Build it from the pinned source rather than downloading a
          # release prebuilt, so the producer (msb) and consumer (agentd)
          # always ship in lockstep — e.g. the boot-params side channel needs
          # both halves at the same revision; a stale prebuilt agentd would
          # silently drop every mount. Static musl: agentd runs before the
          # rootfs is fully set up.
          rustup target add x86_64-unknown-linux-musl
          sudo apt-get install -y --no-install-recommends musl-tools
          cargo build --release \
            --manifest-path vendor/microsandbox/crates/agentd/Cargo.toml \
            --target-dir vendor/microsandbox/target \
            --target x86_64-unknown-linux-musl
          mkdir -p vendor/microsandbox/build
          cp vendor/microsandbox/target/x86_64-unknown-linux-musl/release/agentd \
            vendor/microsandbox/build/agentd
          touch vendor/microsandbox/build/agentd

      - name: cargo build --release -p microsandbox-cli --bin msb
        run: |
          # --no-default-features drops the `prebuilt` feature, so the
          # filesystem crate embeds the build/agentd compiled just above
          # instead of downloading a release prebuilt. net + keyring are the
          # other CLI defaults and stay on.
          cargo build --release --target ${{ matrix.cargo_target }} \
            --manifest-path vendor/microsandbox/Cargo.toml \
            --no-default-features --features net,keyring \
            -p microsandbox-cli --bin msb

      - name: Upload msb binary
        uses: actions/upload-artifact@v7
        with:
          name: msb-bin-${{ matrix.platform }}
          path: vendor/microsandbox/target/${{ matrix.cargo_target }}/release/msb
          retention-days: 7
          if-no-files-found: error

  # Build libkrunfw from source with the KVM-hypervisor config patch
  # from libkrunfw-overrides/. Stock libkrunfw ships only the
  # paravirt-guest helpers (CONFIG_KVM_GUEST=y) — agent-vm needs the
  # in-kernel hypervisor (CONFIG_KVM=y + Intel/AMD backends) so the
  # guest can host nested KVM (Docker-in-Docker, qemu, etc.). See
  # libkrunfw-overrides/README.md for details.
  build-libkrunfw:
    needs: resolve-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            runner: ubuntu-latest
            arch: x86_64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5
        # Need the patch file + LIBKRUNFW_VERSION constant. Submodules
        # via the vendor path; recursive not required for libkrunfw
        # itself (cloned separately below).
        with:
          submodules: true

      - name: Resolve libkrunfw version from vendor/microsandbox
        id: lkv
        shell: bash
        run: |
          set -euo pipefail
          libkrunfw_version=$(awk -F\" \
            '/^pub const LIBKRUNFW_VERSION *: *&str *= *"/{print $2; exit}' \
            vendor/microsandbox/crates/utils/lib/lib.rs)
          test -n "$libkrunfw_version" || { echo "::error::could not extract libkrunfw version"; exit 1; }
          echo "libkrunfw_version=$libkrunfw_version" >> "$GITHUB_OUTPUT"

      - name: Cache libkrunfw build output
        id: lk-cache
        uses: actions/cache@v4
        with:
          # Key on version + arch + sha256 of the patches that affect
          # this arch + workflow file. Hash only `*_${arch}.patch` so an
          # aarch64 patch edit doesn't invalidate the x86_64 cache.
          key: libkrunfw-${{ steps.lkv.outputs.libkrunfw_version }}-${{ matrix.arch }}-${{ hashFiles(format('libkrunfw-overrides/*_{0}.patch', matrix.arch), '.github/workflows/release-npm.yml') }}
          path: libkrunfw-out/

      - name: Install kernel build deps
        if: steps.lk-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential bc flex bison libelf-dev libssl-dev \
            kmod cpio bzip2 xz-utils python3 python3-pyelftools \
            curl ca-certificates patch

      - name: Clone + patch + build libkrunfw
        if: steps.lk-cache.outputs.cache-hit != 'true'
        shell: bash
        env:
          LK_V: ${{ steps.lkv.outputs.libkrunfw_version }}
          ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          git clone --branch "v${LK_V}" --depth 1 \
            https://github.com/containers/libkrunfw.git libkrunfw-src
          cd libkrunfw-src
          # 1) kbuild .config seed (CONFIG_KVM=y + Intel/AMD backends).
          patch -p1 < ../libkrunfw-overrides/config-libkrunfw_${ARCH}.patch
          # 2) Kernel source patches: libkrunfw's Makefile runs
          # `patch -p1 -d $(KERNEL_SOURCES) < $patch` for every file
          # matching `patches/0*.patch` after extracting the tarball.
          # Drop arch-matching source patches from libkrunfw-overrides/
          # there so they ride the same pipeline. File-naming convention:
          # `<topic>_${ARCH}.patch` (arch-specific). The `0999-overrides-`
          # prefix sorts them strictly after libkrunfw's own numbered
          # patches (which currently top out in the 0010-range).
          #
          # `config-libkrunfw*` files are kbuild .config seeds, not
          # kernel source patches — exclude them here. The skip pattern
          # uses a bare `config-libkrunfw*` (no trailing underscore) so
          # future variants like `config-libkrunfw-tdx_${ARCH}.patch`
          # (hyphen) are also caught.
          shopt -s nullglob
          for p in ../libkrunfw-overrides/*_${ARCH}.patch; do
            case "$(basename "$p")" in
              config-libkrunfw*) continue;;
            esac
            cp "$p" "patches/0999-overrides-$(basename "$p")"
          done
          # olddefconfig (run by make rule on first invocation) resolves
          # support symbols (KVM_X86, KVM_SMM, KVM_HYPERV, KVM_VFIO, …).
          make -j"$(nproc)"
          # Sanity: hypervisor symbols must be in the rebuilt vmlinux,
          # otherwise the .so would silently ship the wrong kernel.
          nm linux-*/vmlinux | grep -qE " kvm_dev_ioctl$" \
            || { echo "::error::kvm_dev_ioctl missing — patch did not take"; exit 1; }
          mkdir -p ../libkrunfw-out
          cp libkrunfw.so."${LK_V}" ../libkrunfw-out/

      - name: Upload libkrunfw artifact
        uses: actions/upload-artifact@v7
        with:
          name: libkrunfw-${{ matrix.platform }}
          path: libkrunfw-out/libkrunfw.so.*
          retention-days: 7
          if-no-files-found: error

  # Assemble per-platform npm subpackage: pull in the three artefacts
  # (agent-vm + msb + libkrunfw with KVM=y) from the parallel build
  # jobs, create soname symlinks, upload the populated subpackage tree
  # as the per-platform artifact the publish job downloads.
  package:
    needs: [resolve-version, build-agent-vm, build-msb, build-libkrunfw]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            runner: ubuntu-latest
            libkrunfw_arch: x86_64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5
        # We need vendor/microsandbox source to read LIBKRUNFW_VERSION
        # and LIBKRUNFW_ABI constants. Recursive fetch needed for the
        # libkrunfw sub-submodule? Actually no — we only need the
        # microsandbox crate source for awk. `submodules: true` (one
        # level) is enough; saves the libkrunfw clone time.
        with:
          submodules: true

      - name: Download agent-vm binary
        uses: actions/download-artifact@v8
        with:
          name: agent-vm-bin-${{ matrix.platform }}
          path: npm-dist/agent-vm-${{ matrix.platform }}/bin/

      - name: Download msb binary
        uses: actions/download-artifact@v8
        with:
          name: msb-bin-${{ matrix.platform }}
          path: npm-dist/agent-vm-${{ matrix.platform }}/bin/

      - name: Resolve libkrunfw versions from vendor/microsandbox
        id: lkv
        shell: bash
        run: |
          set -euo pipefail
          msb_version=$(awk -F\" '/^version *=/{print $2; exit}' \
            vendor/microsandbox/Cargo.toml)
          libkrunfw_version=$(awk -F\" \
            '/^pub const LIBKRUNFW_VERSION *: *&str *= *"/{print $2; exit}' \
            vendor/microsandbox/crates/utils/lib/lib.rs)
          libkrunfw_abi=$(awk -F\" \
            '/^pub const LIBKRUNFW_ABI *: *&str *= *"/{print $2; exit}' \
            vendor/microsandbox/crates/utils/lib/lib.rs)
          test -n "$msb_version" || { echo "::error::could not extract msb version"; exit 1; }
          test -n "$libkrunfw_version" || { echo "::error::could not extract libkrunfw version"; exit 1; }
          test -n "$libkrunfw_abi" || { echo "::error::could not extract libkrunfw abi"; exit 1; }
          echo "msb_version=$msb_version"             >> "$GITHUB_OUTPUT"
          echo "libkrunfw_version=$libkrunfw_version" >> "$GITHUB_OUTPUT"
          echo "libkrunfw_abi=$libkrunfw_abi"         >> "$GITHUB_OUTPUT"

      - name: Download patched libkrunfw artifact
        uses: actions/download-artifact@v8
        with:
          name: libkrunfw-${{ matrix.platform }}
          path: npm-dist/agent-vm-${{ matrix.platform }}/lib/

      - name: Create libkrunfw soname symlinks
        shell: bash
        env:
          LK_V:   ${{ steps.lkv.outputs.libkrunfw_version }}
          LK_ABI: ${{ steps.lkv.outputs.libkrunfw_abi }}
        run: |
          set -euo pipefail
          dst=npm-dist/agent-vm-${{ matrix.platform }}/lib
          if [[ "${{ matrix.platform }}" == darwin-* ]]; then
            full="libkrunfw.${LK_ABI}.dylib"
            test -f "$dst/$full" || { echo "::error::$dst/$full missing"; exit 1; }
          else
            full="libkrunfw.so.${LK_V}"
            soname="libkrunfw.so.${LK_ABI}"
            test -f "$dst/$full" || { echo "::error::$dst/$full missing"; exit 1; }
            ln -sf "$full"   "$dst/$soname"
            ln -sf "$soname" "$dst/libkrunfw.so"
          fi
          ls -la "$dst"

      - name: Restore executable bits on the bundled binaries
        # upload-artifact strips POSIX perms when zipping; restore
        # before re-uploading so the next download-artifact lands
        # already-executable. (We *also* chmod in publish as a belt-
        # and-suspenders measure since the round-trip CAN strip
        # perms again — confirmed by v0.1.0's EACCES.)
        run: |
          chmod +x "npm-dist/agent-vm-${{ matrix.platform }}/bin/agent-vm"
          chmod +x "npm-dist/agent-vm-${{ matrix.platform }}/bin/msb"

      - name: Upload assembled platform subpackage
        uses: actions/upload-artifact@v7
        with:
          name: agent-vm-${{ matrix.platform }}
          path: npm-dist/agent-vm-${{ matrix.platform }}/
          retention-days: 7
          if-no-files-found: error

  publish:
    needs: [resolve-version, package]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # No `registry-url:` on purpose — that input makes setup-node write
      # `//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}` into .npmrc.
      # With trusted publishing we have no token, so that line resolves to
      # an empty authToken and npm errors `ENEEDAUTH` instead of falling
      # back to OIDC. Without it, npm uses the default registry
      # (registry.npmjs.org) and the OIDC trusted-publishing flow.
      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      # npm trusted publishing (OIDC) needs npm >= 11.5.1; node 22 ships
      # npm 10.x. With this + `id-token: write` (set at the workflow level)
      # and a trusted publisher configured on npmjs.com for each package,
      # `npm publish` exchanges the GitHub OIDC token for short-lived
      # registry credentials — no long-lived NPM_TOKEN secret — and attaches
      # provenance automatically.
      - name: Upgrade npm for OIDC trusted publishing (>= 11.5.1)
        run: |
          npm install -g npm@latest
          npm --version

      # Download each platform artifact into its own subpackage
      # directory explicitly. `actions/download-artifact@v8` with
      # `pattern:` + a single matched artifact does NOT wrap it in a
      # subdir (the v5 behaviour change vs v4) — files land flat at
      # the `path:` root. Downloading by exact `name:` into a
      # per-artifact `path:` sidesteps that, and keeps the layout
      # explicit when we add more platforms (just add another
      # download step).
      #
      # Each subpackage's package.json is already on disk from the
      # checkout; the artifact carries bin/ + lib/ on top of it.
      # download-artifact will create missing parents.
      - name: Download linux-x64 artifact
        uses: actions/download-artifact@v8
        with:
          name: agent-vm-linux-x64
          path: npm-dist/agent-vm-linux-x64/

      - name: Verify artifact layout + restore executable bits
        # `actions/upload-artifact@v7` packs files into a zip that
        # doesn't preserve POSIX permissions. After download, the
        # binaries land as 0644 — npm publishes them as-is and users
        # get EACCES on first invocation. Restoring +x here is the
        # smallest fix; declaring them in `bin` of the subpackage's
        # package.json would also work but creates a competing
        # `agent-vm` shim that fights the main package's launcher.
        run: |
          set -e
          for d in npm-dist/agent-vm-*-*/bin; do
            test -f "$d/agent-vm" || { echo "missing $d/agent-vm"; exit 1; }
            test -f "$d/msb" || { echo "missing $d/msb"; exit 1; }
            chmod +x "$d/agent-vm" "$d/msb"
          done

      - name: Set versions in every package.json
        env:
          V: ${{ needs.resolve-version.outputs.version }}
        run: |
          set -e
          for p in npm-dist/*/package.json; do
            # Top-level version
            node -e "
              const fs=require('fs');
              const p='$p';
              const j=JSON.parse(fs.readFileSync(p,'utf8'));
              j.version='${V}';
              if (j.optionalDependencies) {
                for (const k of Object.keys(j.optionalDependencies)) {
                  j.optionalDependencies[k]='${V}';
                }
              }
              fs.writeFileSync(p, JSON.stringify(j,null,2)+'\\n');
            "
          done

      - name: Publish platform subpackages first
        # No NODE_AUTH_TOKEN — auth is via OIDC trusted publishing (see the
        # setup-node note above and the workflow-level `id-token: write`).
        env:
          V: ${{ needs.resolve-version.outputs.version }}
        run: |
          set -e
          # Subpackages MUST be published before the main package, or
          # the main package's optionalDependencies resolve to missing.
          # Each publish is idempotent: if a re-run of a failed release
          # finds a subpackage already at this version (npm 403:
          # "cannot publish over existing version"), we accept that and
          # carry on so the workflow can still publish the main package
          # — avoiding a split-state where subpackages exist at v but
          # the main package never makes it.
          for d in npm-dist/agent-vm-*-*; do
            # Node's `require` only resolves bare-relative paths
            # with a leading `./` — without it the loader treats the
            # argument as a node_modules / built-in spec and bails.
            name=$(node -p "require('./$d/package.json').name")
            existing=$(npm view "$name@$V" version 2>/dev/null || true)
            if [[ "$existing" == "$V" ]]; then
              echo "::notice::$name@$V already published; skipping"
              continue
            fi
            (cd "$d" && npm publish --provenance --access public)
          done

      - name: Publish main package
        # OIDC trusted publishing — no NODE_AUTH_TOKEN (see above).
        env:
          V: ${{ needs.resolve-version.outputs.version }}
        run: |
          set -e
          existing=$(npm view "@wirenboard/agent-vm@$V" version 2>/dev/null || true)
          if [[ "$existing" == "$V" ]]; then
            echo "::notice::@wirenboard/agent-vm@$V already published; skipping"
            exit 0
          fi
          cd npm-dist/agent-vm
          npm publish --provenance --access public
